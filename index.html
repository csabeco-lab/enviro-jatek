<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviro Quest</title>

<style>
body{background:#1b1530;color:#fff;font-family:monospace;margin:0}
h1{text-align:center;color:#ffd166}
.container{display:flex;flex-wrap:wrap;gap:20px;padding:10px}
.tools,.drawers{flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px}
.tool{background:#2d2450;border:2px solid black;padding:5px;cursor:pointer;transition:0.2s}
.tool.used{opacity:0.3}
.tool img{width:100%;height:80px;object-fit:contain;background:#eee}
.drawer{background:linear-gradient(#6b4a2b,#3d2b1f);border:3px solid #000;padding:5px;cursor:pointer;transition:0.2s;box-shadow:3px 3px 0 #000}
.drawer.correct{background:#2d6a4f}
.drawer.wrong{background:#9b2226}
.drawer::after{content:"";display:block;width:30px;height:6px;background:#c9a46c;margin:5px auto;border:2px solid #000}
.drawer-slot img{width:60px;height:60px}
.top{display:flex;justify-content:space-between;padding:10px}
button{padding:10px;margin:10px}

#intro{position:fixed;inset:0;background:#120f1c;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;z-index:10}
</style>
</head>

<body>

<div id="intro">
<h1>Enviro Quest</h1>
<p>A környezetvédelmi technikusok a 9. évfolyamon megtanulják a laboratóriumi eszközöket használni és a laboratóriumi rendet. A gyakorlatok végén mindig rendet kell rakniuk. Rakd az eszközöket a megfelelő fiókba!</p>
<button onclick="startGame()">Tovább</button>
</div>

<h1>Enviro Quest</h1>

<div class="top">
<div>⏱ <span id="timer">120</span>s</div>
<div>✔️ <span id="score">0</span></div>
</div>

<div class="container">
<div class="tools grid" id="tools"></div>
<div class="drawers grid" id="drawers"></div>
</div>

<button onclick="check()">Megoldás</button>
<button onclick="resetGame()">Újra</button>

<p id="result"></p>

<script>
const okSound = new Audio('sounds/applause.mp3');      // taps
const glassSound = new Audio('sounds/glass.mp3');      // üvegtörés

const drawerSound = new Audio('https://actions.google.com/sounds/v1/doors/wood_door_open.ogg');
const startSound = new Audio('https://actions.google.com/sounds/v1/cartoon/clang.ogg');
const bellSound = new Audio('https://actions.google.com/sounds/v1/alarms/school_bell.ogg');
const tickSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

const toolsData=[
{id:'kemcso',name:'Kémcső',icon:'icons/kemcso.png'},
{id:'buretta',name:'Büretta',icon:'icons/buretta.png'},
{id:'merleg',name:'Analitikai mérleg',icon:'icons/merleg.png'},
{id:'mikroszkop',name:'Mikroszkóp',icon:'icons/mikroszkop.png'},
{id:'erlenmeyer',name:'Erlenmeyer-lombik',icon:'icons/erlenmeyer.png'},
{id:'petri',name:'Petri-csésze',icon:'icons/petri.png'},
{id:'borszesz',name:'Borszeszégő',icon:'icons/borszesz.png'},
{id:'fogo',name:'Kémcsőfogó csipesz',icon:'icons/fogo.png'},
{id:'merohenger',name:'Mérőhenger',icon:'icons/merohenger.png'},
{id:'fozopohar',name:'Főzőpohár',icon:'icons/fozopohar.png'},
{id:'mozsar',name:'Dörzsmozsár',icon:'icons/mozsar.png'},
{id:'pipetta',name:'Pipetta',icon:'icons/pipetta.png'},
{id:'orauveg',name:'Óraüveg',icon:'icons/orauveg.png'}
];

let placements={};
let selected=null;
let time=120;
let timerInterval=null;
let started=false;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function render(){
 toolsDiv.innerHTML='';
 drawersDiv.innerHTML='';
 placements={};

 shuffle([...toolsData]).forEach(t=>{
  const el=document.createElement('div');
  el.className='tool';
  el.innerHTML=`<img src="${t.icon}">`;
  el.onclick=()=>{if(!started)return;selected=t.id;};
  toolsDiv.appendChild(el);
 });

 shuffle([...toolsData]).forEach(t=>{
  const dr=document.createElement('div');
  dr.className='drawer';
  dr.dataset.id=t.id;
  dr.innerHTML=`<div>${t.name}</div><div class='drawer-slot'></div>`;
  dr.onclick=()=>{
    if(!started || !selected)return;
    drawerSound.currentTime = 0;
    drawerSound.play().catch(()=>{});
    placements[t.id]=selected;

    dr.querySelector('.drawer-slot').innerHTML=`<img src="${toolsData.find(x=>x.id===selected).icon}">`;

    document.querySelectorAll('.tool').forEach(tool=>{
      if(tool.innerHTML.includes(selected)){
        tool.classList.add('used');
      }
    });

    selected=null;
  };
  drawersDiv.appendChild(dr);
 });
}

function startGame(){
 // hangok feloldása első kattintásra GitHub Pages-en is
 okSound.play().then(()=>{okSound.pause(); okSound.currentTime=0;}).catch(()=>{});
 glassSound.play().then(()=>{glassSound.pause(); glassSound.currentTime=0;}).catch(()=>{});
 document.getElementById('intro').style.display='none';
 startSound.currentTime = 0;
 startSound.play().catch(()=>{});
 started=true;
 time=120;
 document.getElementById('timer').innerText=time;
 render();

 timerInterval=setInterval(()=>{
  if(time<=0){
    clearInterval(timerInterval);
    bellSound.currentTime = 0;
    bellSound.play().catch(()=
    check();
    return;
  }

  if(time<=10){
    tickSound.play();
  }

  time--;
  document.getElementById('timer').innerText=time;
 },1000);
}

function check(){
 clearInterval(timerInterval);
 let correct=0;
 document.querySelectorAll('.drawer').forEach(d=>{
  const id=d.dataset.id;
  const placed=placements[id];
  if(placed===id){correct++;d.classList.add('correct');}
  else{d.classList.add('wrong');}
 });

 let percent=Math.round(correct/toolsData.length*100);

 if(percent>=80){
  okSound.play();
  result.innerText=`✔️ ${percent}% - Szép munka!`;
 }else{
  glassSound.play();
  result.innerText=`❌ ${percent}% - Próbáld újra!`;
 }

 document.getElementById('score').innerText=correct;
}

function resetGame(){
 clearInterval(timerInterval);
 started=false;
 document.getElementById('intro').style.display='flex';
 result.innerText='';
}

const toolsDiv=document.getElementById('tools');
const drawersDiv=document.getElementById('drawers');

</script>
</body>
</html>
